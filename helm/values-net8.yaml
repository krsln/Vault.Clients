imagePullSecrets:
  - name: reg-hub-secret

fullnameOverride: vault-dummy-web-net8

image:
  repository: registry.bidyno.com/test/vault-dummy-web-net8
  tag: "1.0.0"
  pullPolicy: Always


extraEnvs:
  - name: Vault__ApiUrl
    value: http://vault-api
  - name: Vault__Debug
    value: "true"
  - name: POSTGRES_PASSWORD
    value: "vault:db/postgres/password"
  - name: POSTGRES_USER
    value: "vault:db/postgres/user"
  - name: NOT_EXIST_TEST
    value: "vault:not-exist"
  - name: Redis
    value: "vault:db/redis/password"
